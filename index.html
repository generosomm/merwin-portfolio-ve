<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Merwin Generoso, Video Editor & Content Creator. 124M+ cumulative video views across TikTok, YouTube, Facebook, and Instagram.">

<meta property="og:title" content="Merwin Generoso — Video Editor & Content Creator">
<meta property="og:description" content="124M+ cumulative video views across TikTok, YouTube, Facebook, and Instagram.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://generosomm.github.io/merwin-portfolio/">
<meta property="og:image" content="https://generosomm.github.io/merwin-portfolio/assets/images/og-cover.jpg">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Merwin Generoso — Video Editor & Content Creator">
<meta name="twitter:description" content="124M+ cumulative video views across TikTok, YouTube, Facebook, and Instagram.">
<meta name="twitter:image" content="https://generosomm.github.io/merwin-portfolio/assets/images/og-cover.jpg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- ambient background cursor spotlight glow -->
<div class="bg-cursor-glow" id="bgCursorGlow" aria-hidden="true"></div>

<!-- custom cursor -->
<div class="custom-cursor" aria-hidden="true">
  <div class="cursor-dot" id="cursorDot">
    <svg viewBox="0 0 36 36" class="cat-svg">
      <!-- ears -->
      <polygon points="6,14 11,3 18,12" fill="#FFFFFF"/>
      <polygon points="30,14 25,3 18,12" fill="#FFFFFF"/>
      <!-- inner ears -->
      <polygon points="8,13 11,6 16,12" fill="#7C93FF"/>
      <polygon points="28,13 25,6 20,12" fill="#7C93FF"/>
      <!-- head -->
      <circle cx="18" cy="20" r="13" fill="#FFFFFF"/>
      <!-- eyes -->
      <ellipse cx="13" cy="19" rx="2" ry="3" fill="#0A0A0D"/>
      <ellipse cx="23" cy="19" rx="2" ry="3" fill="#0A0A0D"/>
      <!-- nose & mouth -->
      <polygon points="18,22 16.5,20.5 19.5,20.5" fill="#3D5CFF"/>
      <path d="M16 23 Q18 25 20 23" stroke="#0A0A0D" stroke-width="1.2" fill="none"/>
      <!-- whiskers -->
      <line x1="4" y1="19" x2="10" y2="20" stroke="#FFFFFF" stroke-width="1.2"/>
      <line x1="4" y1="23" x2="10" y2="22" stroke="#FFFFFF" stroke-width="1.2"/>
      <line x1="32" y1="19" x2="26" y2="20" stroke="#FFFFFF" stroke-width="1.2"/>
      <line x1="32" y1="23" x2="26" y2="22" stroke="#FFFFFF" stroke-width="1.2"/>
    </svg>
  </div>
  <div class="cursor-ring" id="cursorRing"></div>
</div>

<!-- film grain -->
<div class="grain" aria-hidden="true"></div>

<!-- bg glow -->
<div class="bg-glow" aria-hidden="true"></div>

<!-- nav -->
<nav class="timeline-nav" id="nav-root">
  <div class="load-msg">Loading navigation…</div>
</nav>

<!-- hero -->
<header id="home" class="hero" data-theme="dark"></header>

<!-- work -->
<section id="work" data-theme="dark"></section>

<!-- services -->
<section id="services" data-theme="dark"></section>

<!-- stats -->
<section id="stats" class="stats-detail" data-theme="dark"></section>

<!-- testimonials -->
<section id="testimonials" data-theme="dark"></section>

<!-- toolkit -->
<section id="skills" data-theme="dark"></section>

<!-- dev projects -->
<section id="dev" data-theme="dark"></section>

<!-- about -->
<section id="about" data-theme="dark"></section>

<!-- contact -->
<section id="contact" class="contact" data-theme="dark"></section>

<!-- footer -->
<footer id="footer-root"></footer>

<!-- video modal -->
<div class="video-modal" id="videoModal" aria-hidden="true">
  <div class="video-modal-backdrop" data-modal-close></div>
  <div class="video-modal-content">
    <button class="video-modal-close" data-modal-close aria-label="Close video">&times;</button>
    <video id="videoModalPlayer" controls playsinline controlsList="nodownload" disablePictureInPicture></video>
  </div>
</div>

<!-- pdf modal -->
<div class="video-modal" id="pdfModal" aria-hidden="true">
  <div class="video-modal-backdrop" data-pdf-close></div>
  <div class="video-modal-content pdf-modal-content">
    <div class="pdf-modal-header">
      <a href="assets/resume.pdf" download id="pdfDownloadBtn" class="btn-primary" style="padding: 8px 16px; font-size: 12px; margin-right: auto;">Download PDF</a>
      <button class="video-modal-close" data-pdf-close aria-label="Close PDF">&times;</button>
    </div>
    <iframe id="pdfViewer" src="" frameborder="0"></iframe>
  </div>
</div>

<script src="js/main.js"></script>

</body>
</html>
