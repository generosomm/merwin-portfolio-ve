<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merwin Generoso — Web Developer & Video Editor</title>
<meta name="description" content="Merwin Generoso, Web Developer & Video Editor. 124M+ cumulative video views across TikTok, YouTube, Facebook, and Instagram.">

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230A0A0D'/><text x='50' y='68' font-size='54' font-family='Arial Black, sans-serif' fill='%233D5CFF' text-anchor='middle'>M</text></svg>">

<meta property="og:title" content="Merwin Generoso — Web Developer & Video Editor">
<meta property="og:description" content="124M+ cumulative video views across TikTok, YouTube, Facebook, and Instagram.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://generosomm.github.io/merwin-portfolio/">
<meta property="og:image" content="https://generosomm.github.io/merwin-portfolio/assets/images/og-cover.jpg">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Merwin Generoso — Web Developer & Video Editor">
<meta name="twitter:description" content="124M+ cumulative video views across TikTok, YouTube, Facebook, and Instagram.">
<meta name="twitter:image" content="https://generosomm.github.io/merwin-portfolio/assets/images/og-cover.jpg">

<script>
  (function() {
    if (localStorage.getItem("portfolio-theme") === "light") {
      document.documentElement.setAttribute("data-theme", "light");
    }
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- loading screen -->
<div class="loader" id="loader" aria-hidden="true">
  <div class="loader-inner">
    <div class="loader-brand">ERO <span>|</span> VISUALS</div>
    <div class="loader-sub">merwin generoso</div>
    <div class="loader-bar-wrap">
      <div class="loader-bar" id="loaderBar"></div>
    </div>
  </div>
</div>

<!-- scroll progress bar -->
<div class="scroll-progress" id="scrollProgress"></div>

<!-- custom cursor -->
<div class="c-cursor-dot" id="cursorDot"></div>
<div class="c-cursor-ring" id="cursorRing"></div>


<!-- film grain -->
<div class="grain" aria-hidden="true"></div>

<!-- bg glow -->
<div class="bg-glow" aria-hidden="true"></div>

<!-- cursor spotlight glow -->
<div class="bg-cursor-glow" aria-hidden="true"></div>

<!-- nav -->
<nav class="timeline-nav" id="nav-root">
  <div class="load-msg">Loading navigation…</div>
</nav>

<!-- hero -->
<header id="home" class="hero" data-theme="dark"></header>

<!-- work -->
<section id="work" data-theme="dark"></section>

<!-- services -->
<section id="services" data-theme="dark"></section>

<!-- skills -->
<section id="skills" data-theme="dark"></section>

<!-- stats -->
<section id="stats" class="stats-detail" data-theme="dark"></section>

<!-- testimonials -->
<section id="testimonials" data-theme="dark"></section>


<!-- about -->
<section id="about" data-theme="dark"></section>

<!-- dev / also builds -->
<section id="dev" data-theme="dark"></section>

<!-- contact -->
<section id="contact" class="contact" data-theme="dark"></section>

<!-- footer -->
<footer id="footer-root"></footer>

<!-- video modal -->
<div class="video-modal" id="videoModal" aria-hidden="true">
  <div class="video-modal-backdrop" data-modal-close></div>
  <div class="video-modal-content">
    <button class="video-modal-close" data-modal-close aria-label="Close video">&times;</button>
    <video id="videoModalPlayer" controls playsinline controlsList="nodownload" disablePictureInPicture></video>
  </div>
</div>

<!-- image modal -->
<div class="image-modal" id="imageModal" aria-hidden="true">
  <div class="image-modal-backdrop" data-img-close></div>
  <div class="image-modal-content">
    <button class="image-modal-close" data-img-close aria-label="Close image">&times;</button>
    <img id="imageModalImg" src="" alt="Full size preview">
  </div>
</div>

<!-- resume modal -->
<div class="resume-modal" id="resumeModal" aria-hidden="true">
  <div class="resume-modal-backdrop" data-resume-close></div>
  <div class="resume-modal-content">
    <button class="resume-modal-close" data-resume-close aria-label="Close CV">&times;</button>
    <div class="resume-modal-header">
      <h3 style="font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 600; margin: 0;">CV Preview</h3>
      <a id="resumeDownloadBtn" href="" download class="btn-primary" style="padding: 8px 16px; font-size: 11px;">Download PDF</a>
    </div>
    <div class="resume-iframe-container">
      <iframe id="resumeModalIframe" src="" frameborder="0" title="Resume Preview"></iframe>
      <div class="resume-fallback">
        <p>Your browser doesn't support inline PDFs.</p>
        <a id="resumeFallbackBtn" href="" download class="btn-ghost" style="padding: 8px 16px; font-size: 11px; margin-top: 10px; display: inline-block;">Download Instead</a>
      </div>
    </div>
  </div>
<!-- theme prompt modal (first visit only) -->
<div class="theme-prompt-modal" id="themePromptModal" aria-hidden="true">
  <div class="theme-prompt-backdrop"></div>
  <div class="theme-prompt-card">
    <span class="theme-prompt-eyebrow">Visual Experience</span>
    <h2>Select Your Theme</h2>
    <p>Choose how you'd like to explore the portfolio. You can change this anytime from the navigation bar.</p>
    
    <div class="theme-options">
      <button class="theme-option-btn option-dark" data-select-theme="dark">
        <div class="theme-preview-box preview-dark">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </div>
        <div class="theme-option-info">
          <strong>Dark Mode</strong>
          <span>Deep obsidian & glowing accents</span>
        </div>
      </button>

      <button class="theme-option-btn option-light" data-select-theme="light">
        <div class="theme-preview-box preview-light">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </div>
        <div class="theme-option-info">
          <strong>Light Mode</strong>
          <span>Clean slate white & blue accents</span>
        </div>
      </button>
    </div>
  </div>
</div>

<script src="js/main.js"></script>

</body>
</html>
